<!-- ===== SB-INTRO (셀링 인트로 투어) START ===== injected by patch-intro.mjs ===== -->
<style id="sb-intro-style">
/* 반투명 스크림 — 뒤의 살아있는 현황판이 비쳐 보이게 */
#sb-intro{position:fixed;inset:0;z-index:100000;display:flex;align-items:center;justify-content:center;padding:20px;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
  background:rgba(8,14,26,.46);backdrop-filter:blur(7px) saturate(118%);-webkit-backdrop-filter:blur(7px) saturate(118%);
  color:#eaf0fa;opacity:1;transition:opacity .4s ease;-webkit-font-smoothing:antialiased;}
#sb-intro.sb-hide{opacity:0;pointer-events:none;}
#sb-intro *{box-sizing:border-box;}
.sb-skip{position:absolute;top:14px;right:16px;background:rgba(255,255,255,.1);color:#dbe5f5;border:1px solid rgba(255,255,255,.16);
  border-radius:999px;padding:8px 15px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px;
  backdrop-filter:blur(4px);transition:background .15s,color .15s;}
.sb-skip:hover{background:rgba(255,255,255,.18);color:#fff;}

/* ⭐ 고정 높이 카드 = 다음 버튼이 슬라이드마다 안 움직임(한 위치 연타) */
.sb-card{width:min(540px,94vw);height:min(556px,86vh);display:flex;flex-direction:column;
  background:linear-gradient(180deg,rgba(20,34,60,.82),rgba(11,21,40,.86));backdrop-filter:blur(18px) saturate(130%);-webkit-backdrop-filter:blur(18px) saturate(130%);
  border:1px solid rgba(255,255,255,.12);border-radius:22px;padding:26px 28px 20px;
  box-shadow:0 30px 80px -22px rgba(0,0,0,.7);position:relative;}
.sb-dots{display:flex;gap:7px;justify-content:center;margin-bottom:16px;flex-shrink:0;}
.sb-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.22);cursor:pointer;transition:all .2s;padding:0;border:0;}
.sb-dot.on{background:#4d9bff;width:22px;border-radius:99px;}
.sb-dot.done{background:rgba(77,155,255,.5);}

/* stage = 가운데 정렬되는 가변 콘텐츠 영역(넘치면 스크롤), 위아래로 nav는 고정 */
.sb-stage{flex:1;min-height:0;overflow-y:auto;display:flex;flex-direction:column;justify-content:center;}
.sb-kick{font-size:12.5px;font-weight:800;letter-spacing:.3px;color:#6fb0ff;margin-bottom:10px;}
.sb-kick.warn{color:#ff8a7a;}
.sb-kick.good{color:#43d6a0;}
.sb-title{font-size:clamp(21px,5.4vw,27px);font-weight:800;line-height:1.34;letter-spacing:-.5px;margin:0 0 13px;color:#fff;word-break:keep-all;}
.sb-body{font-size:15px;line-height:1.74;color:#c3d0e6;margin:0 0 18px;word-break:keep-all;}
.sb-body b{color:#fff;font-weight:700;}
.sb-body .hl{color:#8fc0ff;font-weight:800;}
.sb-body .hlw{color:#ff9d8e;font-weight:800;}
.sb-stage{animation:sbIn .38s cubic-bezier(.2,.7,.2,1);}
@keyframes sbIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.sb-vis{margin:2px 0 2px;}

/* nav — 하단 고정. 다음 버튼은 항상 오른쪽 끝 같은 자리 */
.sb-nav{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:16px;flex-shrink:0;}
.sb-count{font-size:12px;color:#8493ad;font-variant-numeric:tabular-nums;flex-shrink:0;}
.sb-btns{display:flex;gap:9px;align-items:center;}
.sb-prev{background:transparent;color:#a6b6d0;border:1px solid rgba(255,255,255,.16);border-radius:11px;padding:11px 16px;
  font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;}
.sb-prev:hover{color:#fff;border-color:rgba(255,255,255,.34);}
.sb-prev[hidden]{display:none;}
/* 크기 고정(패딩·최소폭 동일) → 연타해도 버튼 안 움직임. 마지막 슬라이드는 색만 바뀜 */
.sb-next{background:#3182f6;color:#fff;border:0;border-radius:11px;padding:12px 20px;font-size:14.5px;font-weight:800;
  cursor:pointer;font-family:inherit;min-width:118px;text-align:center;
  box-shadow:0 10px 24px -10px rgba(49,130,246,.85);transition:transform .12s,filter .15s,background .2s;}
.sb-next:hover{filter:brightness(1.08);}
.sb-next:active{transform:scale(.97);}
.sb-next.cta{background:linear-gradient(135deg,#3aa0ff,#2563eb);}

/* ----- mini mockups ----- */
.sb-list{border-radius:12px;padding:11px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);}
.sb-lrow{display:flex;align-items:center;gap:8px;padding:7px 9px;margin-bottom:5px;border-radius:7px;background:rgba(255,255,255,.05);}
.sb-lrow:last-child{margin-bottom:0;}
.sb-lbar{height:8px;border-radius:4px;background:rgba(255,255,255,.2);flex:1;}
.sb-lq{font-size:12px;color:#ff9d8e;font-weight:800;flex-shrink:0;}
.sb-lmut{font-size:11px;color:#7a88a0;flex-shrink:0;}
.sb-chairs{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;}
.sb-chair{position:relative;width:60px;height:46px;border-radius:9px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  display:flex;align-items:center;justify-content:center;font-size:12px;color:#a6b6d0;font-weight:700;}
.sb-chair .q{position:absolute;top:-7px;right:-5px;font-size:14px;color:#ff8a7a;font-weight:900;transform:rotate(12deg);}
/* mini board */
.sb-mb{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:12px;padding:10px;position:relative;overflow:hidden;}
.sb-mb-r{display:flex;align-items:center;gap:7px;height:21px;margin-bottom:4px;}
.sb-mb-r:last-child{margin-bottom:0;}
.sb-mb-lab{width:30px;font-size:10px;color:#8493ad;flex-shrink:0;text-align:center;}
.sb-mb-track{flex:1;position:relative;height:17px;border-radius:5px;background:rgba(255,255,255,.05);}
.sb-mb-blk{position:absolute;top:1px;bottom:1px;border-radius:4px;display:flex;align-items:center;padding:0 5px;font-size:9.5px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;}
.sb-mb-blk.dash{background:transparent!important;border:1px dashed rgba(255,255,255,.32);color:#a6b6d0;}
.sb-mb-now{position:absolute;top:-3px;bottom:-3px;width:2px;background:#6fb0ff;z-index:5;}
.sb-mb-now::after{content:"지금";position:absolute;top:-12px;left:-9px;font-size:8px;color:#6fb0ff;font-weight:800;}
.sb-mb-free{position:absolute;top:1px;bottom:1px;border-radius:4px;border:1px dashed #43d6a0;background:rgba(67,214,160,.12);display:flex;align-items:center;justify-content:center;font-size:8.5px;color:#5fe0b0;font-weight:800;}
/* split before/after */
.sb-split{display:flex;align-items:center;gap:10px;}
.sb-half{flex:1;min-width:0;}
.sb-half h4{margin:0 0 6px;font-size:11px;font-weight:800;text-align:center;}
.sb-half.b h4{color:#ff9d8e;}
.sb-half.a h4{color:#5fe0b0;}
.sb-arrow{flex-shrink:0;font-size:20px;color:#6fb0ff;font-weight:900;}
.sb-half.b{opacity:.6;}
/* benefit list */
.sb-ben{list-style:none;margin:0;padding:0;}
.sb-ben li{display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.07);font-size:14.5px;color:#d2deef;line-height:1.5;}
.sb-ben li:last-child{border-bottom:0;}
.sb-ben .ic{color:#43d6a0;font-weight:900;flex-shrink:0;margin-top:1px;}
.sb-ben b{color:#fff;}
.sb-ben .pay{color:#8fc0ff;font-weight:800;}
/* replay button on board */
#sb-replay{position:fixed;bottom:14px;right:14px;z-index:9998;background:rgba(12,68,124,.92);color:#fff;border:0;border-radius:999px;
  padding:9px 15px;font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit;display:none;align-items:center;gap:6px;
  box-shadow:0 6px 20px -8px rgba(0,0,0,.5);backdrop-filter:blur(4px);}
#sb-replay:hover{filter:brightness(1.12);}
@media (max-width:430px){
  .sb-card{padding:22px 18px 16px;border-radius:18px;height:min(540px,90vh);}
  .sb-body{font-size:14px;}
  .sb-next{padding:12px 14px;min-width:104px;}
  .sb-prev{padding:11px 13px;}
  .sb-chair{width:52px;height:42px;}
}
@media (prefers-reduced-motion:reduce){.sb-stage{animation:none;}#sb-intro{transition:none;}}
</style>

<div id="sb-intro" role="dialog" aria-modal="true" aria-label="진료 현황판 소개">
  <button class="sb-skip" id="sbSkip" type="button">건너뛰기 ✕</button>
  <div class="sb-card">
    <div class="sb-dots" id="sbDots"></div>
    <div class="sb-stage" id="sbStage"></div>
    <div class="sb-nav">
      <span class="sb-count" id="sbCount"></span>
      <div class="sb-btns">
        <button class="sb-prev" id="sbPrev" type="button" hidden>← 이전</button>
        <button class="sb-next" id="sbNext" type="button">다음 →</button>
      </div>
    </div>
  </div>
</div>
<button id="sb-replay" type="button"><i class="ti ti-info-circle"></i> 소개 다시 보기</button>

<script id="sb-intro-script">
(function(){
  "use strict";
  var KEY='sasaBoardIntro:v2';   // 슬라이드 개편 → 키 갱신(기존 사용자도 새 인트로 1회 노출)
  var root=document.getElementById('sb-intro');
  var replay=document.getElementById('sb-replay');
  if(!root) return;

  // ---- 미니 현황판 목업 (실제 보드 색 재사용) ----
  // 김병훈 #7F77DD · 정희수 #1D9E75 · 이주아 #D85A30 · 조성아 #D4537E
  function miniBoard(opts){
    opts=opts||{};
    var rows=[
      {lab:'1번', blks:[{l:'12%',w:'40%',c:'#7F77DD',t:'인레이 세팅'}]},
      {lab:'2번', blks:[{l:'5%',w:'55%',c:'#D4537E',t:'전악 sc'}]},
      {lab:'3번', blks:[{l:'18%',w:'38%',c:'#1D9E75',t:'c/f 본진료'}], free: opts.free?{l:'60%',w:'22%'}:null},
      {lab:'4번', blks:[{l:'8%',w:'46%',c:'#D85A30',t:'prep'}]},
      {lab:'5번', blks:[{l:'56%',w:'34%',c:'#D85A30',t:'cu',dash:opts.over}]},
      {lab:'6번', blks:[{l:'52%',w:'30%',c:'#7F77DD',t:'sc'}]}
    ];
    var h='<div class="sb-mb">';
    rows.forEach(function(r){
      h+='<div class="sb-mb-r"><span class="sb-mb-lab">'+r.lab+'</span><span class="sb-mb-track">';
      r.blks.forEach(function(b){
        h+='<span class="sb-mb-blk'+(b.dash?' dash':'')+'" style="left:'+b.l+';width:'+b.w+';'+(b.dash?'':'background:'+b.c)+'">'+b.t+'</span>';
      });
      if(r.free) h+='<span class="sb-mb-free" style="left:'+r.free.l+';width:'+r.free.w+'">마취 OK</span>';
      h+='<span class="sb-mb-now" style="left:48%"></span></span></div>';
    });
    h+='</div>';
    return h;
  }
  function messyList(){
    var names=['김재권','강지은','김도연','이주희','박종길'];
    var h='<div class="sb-list">';
    names.forEach(function(n){
      h+='<div class="sb-lrow"><span class="sb-lmut">'+n+'</span><span class="sb-lbar"></span><span class="sb-lq">?</span></div>';
    });
    h+='</div>';
    return h;
  }

  // ---- 슬라이드 4장 (공감 → 통찰 → 해결 → 이득+CTA). 한 장 = 한 메시지, 짧게. ----
  var SLIDES=[
    { // 1. 공감 Hook
      kick:'보드 보기 전에 · 20초', kc:'',
      title:'지금 우리 진료실,<br>누가 뭘 하고 있죠?',
      body:'체어 6개가 동시에 돌아갑니다. 그걸 지금까진 <b>머릿속으로</b> 따라가셨죠.',
      vis:'<div class="sb-chairs">'+[1,2,3,4,5,6].map(function(n){return '<div class="sb-chair">'+n+'번<span class="q">?</span></div>';}).join('')+'</div>'
    },
    { // 2. 통찰(전환) — 리스트 vs 한 판
      kick:'같은 정보, 다른 그림', kc:'',
      title:'리스트는 계산해야 보이고,<br>한 판은 그냥 보입니다',
      body:'이름만 줄선 접수목록은 <span class="hlw">한 줄씩 머리로</span> 풀어야 합니다. 한 판으로 깔면 <span class="hl">눈에 바로</span> 들어옵니다.',
      vis:'<div class="sb-split">'+
            '<div class="sb-half b"><h4>리스트로 보면</h4>'+messyList()+'</div>'+
            '<div class="sb-arrow">→</div>'+
            '<div class="sb-half a"><h4>한 판으로 보면</h4>'+miniBoard({})+'</div>'+
          '</div>'
    },
    { // 3. 해결 — 무엇을 보여주나
      kick:'한 화면이 보여주는 것', kc:'good',
      title:'6개 체어를, 하나의 타임라인으로',
      body:'<b>누가</b>(색) · <b>뭘</b> · <b>언제 끝날지</b>(블록 길이)가 한눈에. 빈칸은 <span class="hl">"끼워넣을 틈"</span>, 같은 색이 겹치면 <span class="hlw">"그 원장 과부하"</span>.',
      vis:miniBoard({free:true})
    },
    { // 4. 이득 + CTA
      kick:'그래서 좋은 점', kc:'good',
      title:'빈 시간이 줄면,<br>같은 시간에 더 봅니다',
      body:'',
      vis:'<ul class="sb-ben">'+
        '<li><span class="ic">✓</span><span><b>빈 체어·빈 손이 바로</b> → 환자 호출이 안 밀림</span></li>'+
        '<li><span class="ic">✓</span><span><b>과부하·겹침 자동 경고</b> → 한 원장에 몰리기 전 분산</span></li>'+
        '<li><span class="ic">✓</span><span><b>신환·시간약속·지연 한눈에</b> → 놓쳐 사과할 일이 줄어듦</span></li>'+
        '<li><span class="ic">✓</span><span class="pay">결국 — 같은 인력·같은 시간에 매출이 더.</span></li>'+
        '</ul>',
      cta:'현황판 보기 →'
    }
  ];

  var i=0, N=SLIDES.length;
  var stage=document.getElementById('sbStage');
  var dots=document.getElementById('sbDots');
  var prev=document.getElementById('sbPrev');
  var next=document.getElementById('sbNext');
  var count=document.getElementById('sbCount');

  for(var d=0;d<N;d++){(function(d){
    var b=document.createElement('button');
    b.className='sb-dot';b.type='button';b.setAttribute('aria-label',(d+1)+'번째');
    b.onclick=function(){go(d);};
    dots.appendChild(b);
  })(d);}

  function paint(){
    var s=SLIDES[i];
    stage.innerHTML='<div class="sb-kick '+(s.kc||'')+'">'+s.kick+'</div>'+
      '<h2 class="sb-title">'+s.title+'</h2>'+
      (s.body?'<p class="sb-body">'+s.body+'</p>':'')+
      '<div class="sb-vis">'+(s.vis||'')+'</div>';
    // restart entry animation
    stage.style.animation='none'; void stage.offsetWidth; stage.style.animation='';
    stage.scrollTop=0;
    Array.prototype.forEach.call(dots.children,function(el,idx){
      el.className='sb-dot'+(idx===i?' on':idx<i?' done':'');
    });
    prev.hidden = i===0;
    var last = i===N-1;
    next.textContent = last ? (SLIDES[i].cta||'시작하기 →') : '다음 →';
    next.classList.toggle('cta', last);
    count.textContent=(i+1)+' / '+N;
  }
  function go(n){ i=Math.max(0,Math.min(N-1,n)); paint(); }
  function nextFn(){ if(i>=N-1){ close(); } else { go(i+1); } }
  function prevFn(){ go(i-1); }

  function close(){
    try{ localStorage.setItem(KEY,'1'); }catch(e){}
    root.classList.add('sb-hide');
    document.documentElement.style.overflow='';
    document.body.style.overflow='';
    document.removeEventListener('keydown',onKey);
    setTimeout(function(){ root.style.display='none'; },420);
    if(replay) replay.style.display='inline-flex';
  }
  function open(){
    i=0; paint();
    root.style.display='flex';
    root.classList.remove('sb-hide');
    document.documentElement.style.overflow='hidden';
    document.body.style.overflow='hidden';
    document.addEventListener('keydown',onKey);
    if(replay) replay.style.display='none';
  }
  function onKey(e){
    if(e.key==='Escape'){ close(); }
    else if(e.key==='ArrowRight'||e.key==='Enter'){ e.preventDefault(); nextFn(); }
    else if(e.key==='ArrowLeft'){ e.preventDefault(); prevFn(); }
  }

  next.onclick=nextFn;
  prev.onclick=prevFn;
  document.getElementById('sbSkip').onclick=close;
  if(replay) replay.onclick=open;

  var seen=false; try{ seen=localStorage.getItem(KEY)==='1'; }catch(e){}
  if(seen){
    root.style.display='none';
    if(replay) replay.style.display='inline-flex';
  } else {
    open();
  }
})();
</script>
<!-- ===== SB-INTRO END ===== -->
