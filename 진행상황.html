<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>진행상황 — 서울사계절치과</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,'Apple SD Gothic Neo','Pretendard','Noto Sans KR',sans-serif;background:#f7f8fa;color:#111;min-height:100vh;}

nav{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid #e8eaed;display:flex;align-items:center;padding:0 24px;height:52px;gap:12px;}
.back-btn{display:flex;align-items:center;gap:6px;color:#555;text-decoration:none;font-size:13px;padding:5px 10px;border-radius:8px;transition:background .15s;}
.back-btn:hover{background:#f0f2f5;}
.nav-title{font-size:14px;font-weight:700;color:#111;letter-spacing:-.4px;}
.nav-date{margin-left:auto;font-size:11.5px;color:#aaa;}

main{max-width:1000px;margin:0 auto;padding:36px 20px 80px;}

h1{font-size:20px;font-weight:800;letter-spacing:-.6px;margin-bottom:28px;}

/* 3열 보드 */
.board{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
@media(max-width:680px){.board{grid-template-columns:1fr;}}

.col{background:#fff;border:1.5px solid #e8eaed;border-radius:14px;overflow:hidden;}

.col-head{padding:14px 16px 12px;border-bottom:1px solid #f0f1f3;display:flex;align-items:center;gap:8px;}
.col-icon{font-size:16px;line-height:1;}
.col-name{font-size:14px;font-weight:800;letter-spacing:-.4px;}
.col-status{margin-left:auto;font-size:10.5px;font-weight:600;padding:3px 9px;border-radius:20px;}
.s-wip{background:#dcfce7;color:#16a34a;}
.s-empty{background:#f1f5f9;color:#94a3b8;}

.col-body{padding:12px 12px 14px;display:flex;flex-direction:column;gap:8px;min-height:80px;}

/* 타임라인 카드 */
.card{border-radius:10px;padding:12px 14px;background:#f8fafc;border:1px solid #e2e8f0;position:relative;}
.card-date{font-size:10.5px;font-weight:700;color:#64748b;margin-bottom:5px;display:flex;align-items:center;gap:5px;}
.dot-day{width:5px;height:5px;border-radius:50%;background:#94a3b8;display:inline-block;}
.card-text{font-size:13px;font-weight:600;color:#1e293b;letter-spacing:-.3px;line-height:1.45;}
.card-note{font-size:11px;color:#f59e0b;font-weight:600;margin-top:4px;}

/* 현재 진행 강조 */
.card.current{background:#f0fdf4;border-color:#86efac;}
.card.current .card-date{color:#16a34a;}
.card.current .dot-day{background:#22c55e;}

/* 빈 열 */
.empty-msg{font-size:12.5px;color:#c8cbd0;text-align:center;padding:24px 0;letter-spacing:-.2px;}

/* 연결선 */
.card+.card::before{content:'';display:block;width:1px;height:8px;background:#e2e8f0;margin:-8px auto 0;margin-left:20px;}
</style>
</head>
<body>

<nav>
  <a class="back-btn" href="index.html">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8l5 5" stroke="#555" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    홈
  </a>
  <span class="nav-title">진행상황</span>
  <span class="nav-date">2026-06-18</span>
</nav>

<main>
  <h1>🗂️ 진행상황</h1>

  <div class="board">

    <!-- 리콜 -->
    <div class="col">
      <div class="col-head">
        <span class="col-icon">📞</span>
        <span class="col-name">리콜</span>
        <span class="col-status s-empty">대기</span>
      </div>
      <div class="col-body">
        <div class="empty-msg">일정 조율 중</div>
      </div>
    </div>

    <!-- 보험청구 -->
    <div class="col">
      <div class="col-head">
        <span class="col-icon">📋</span>
        <span class="col-name">보험청구</span>
        <span class="col-status s-wip">진행 중</span>
      </div>
      <div class="col-body">

        <div class="card current">
          <div class="card-date"><span class="dot-day"></span>6월 22일 월</div>
          <div class="card-text">검토용 페이지 생성 → 본원 2일 검수</div>
        </div>

        <div class="card">
          <div class="card-date"><span class="dot-day"></span>6월 24일 수</div>
          <div class="card-text">타치과 보험기능 세팅 준비</div>
          <div class="card-note">정교수님 영입 고민 중</div>
        </div>

        <div class="card">
          <div class="card-date"><span class="dot-day"></span>6월 26일 금</div>
          <div class="card-text">타치과 2곳 보험기능 추가</div>
        </div>

        <div class="card">
          <div class="card-date"><span class="dot-day"></span>6월 29일 월</div>
          <div class="card-text">타치과 피드백 수집</div>
          <div class="card-note">정교수님 영입 여부 결정</div>
        </div>

      </div>
    </div>

    <!-- EMR 제작 -->
    <div class="col">
      <div class="col-head">
        <span class="col-icon">🖥️</span>
        <span class="col-name">EMR 제작</span>
        <span class="col-status s-empty">대기</span>
      </div>
      <div class="col-body">
        <div class="empty-msg">일정 조율 중</div>
      </div>
    </div>

  </div>
</main>

</body>
</html>
