<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>팀 진행상황 — 서울사계절치과</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,'Apple SD Gothic Neo','Pretendard','Noto Sans KR',sans-serif;background:#f4f6f9;color:#1a1a2e;min-height:100vh;}

/* NAV */
nav{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid #e8eaed;display:flex;align-items:center;padding:0 24px;height:52px;gap:12px;}
.back-btn{display:flex;align-items:center;gap:6px;color:#555;text-decoration:none;font-size:13px;padding:5px 10px;border-radius:8px;transition:background .15s;}
.back-btn:hover{background:#f0f2f5;}
.nav-title{font-size:14px;font-weight:700;color:#1a1a2e;letter-spacing:-.4px;}
.nav-badge{font-size:11px;color:#888;background:#f4f6f9;border:1px solid #e8eaed;padding:2px 8px;border-radius:20px;margin-left:auto;}
.edit-hint{font-size:11.5px;color:#aaa;letter-spacing:-.2px;}

/* MAIN */
main{max-width:1080px;margin:0 auto;padding:32px 24px 80px;}

/* HEADER */
.page-header{margin-bottom:28px;}
.page-header h1{font-size:22px;font-weight:800;letter-spacing:-.7px;margin-bottom:4px;}
.page-header p{font-size:13.5px;color:#777;letter-spacing:-.2px;}
.updated{font-size:12px;color:#aaa;margin-top:8px;display:flex;align-items:center;gap:5px;}
.updated::before{content:'';width:6px;height:6px;border-radius:50%;background:#22c55e;display:inline-block;}

/* SECTION LABEL */
.section-label{font-size:11.5px;font-weight:700;color:#888;letter-spacing:.6px;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.section-label::after{content:'';flex:1;height:1px;background:#e8eaed;}

/* TEAM GRID */
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(196px,1fr));gap:14px;margin-bottom:36px;}
.member-card{background:#fff;border:1.5px solid #e8eaed;border-radius:16px;padding:18px 18px 16px;cursor:default;transition:border-color .15s,box-shadow .15s;}
.member-card:hover{border-color:#94d0a0;box-shadow:0 4px 18px rgba(34,197,94,.1);}
.member-top{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.member-name{font-size:14px;font-weight:700;letter-spacing:-.4px;}
.member-role{font-size:11px;color:#999;letter-spacing:-.1px;margin-top:1px;}
.member-tasks{display:flex;flex-direction:column;gap:6px;}
.task-item{display:flex;align-items:flex-start;gap:7px;font-size:12.5px;color:#444;line-height:1.45;letter-spacing:-.2px;}
.task-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.member-empty{font-size:12px;color:#bbb;font-style:italic;}

/* STATUS: dot colors */
.dot-active{background:#22c55e;}
.dot-waiting{background:#f59e0b;}
.dot-blocked{background:#ef4444;}
.dot-review{background:#3b82f6;}

/* STATUS BADGE on member */
.status-chip{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:600;padding:3px 8px;border-radius:20px;margin-top:10px;}
.chip-active{background:#dcfce7;color:#16a34a;}
.chip-idle{background:#f1f5f9;color:#94a3b8;}
.chip-blocked{background:#fee2e2;color:#dc2626;}

/* PROJECT BOARD */
.board{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:36px;}
@media(max-width:700px){.board{grid-template-columns:1fr;}}
.col-header{font-size:12px;font-weight:700;letter-spacing:-.2px;padding:10px 14px;border-radius:10px 10px 0 0;display:flex;align-items:center;gap:7px;}
.col-todo .col-header{background:#f1f5f9;color:#64748b;}
.col-doing .col-header{background:#dcfce7;color:#15803d;}
.col-done .col-header{background:#f0fdf4;color:#16a34a;}
.col-count{margin-left:auto;font-size:11px;font-weight:600;opacity:.7;}
.col-body{background:#fff;border:1.5px solid #e8eaed;border-top:none;border-radius:0 0 12px 12px;padding:10px;min-height:80px;display:flex;flex-direction:column;gap:8px;}
.proj-card{border-radius:10px;padding:12px 14px;cursor:default;transition:transform .12s,box-shadow .12s;}
.proj-card:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.08);}
.proj-title{font-size:13px;font-weight:700;letter-spacing:-.4px;margin-bottom:4px;}
.proj-sub{font-size:11.5px;color:#888;line-height:1.5;letter-spacing:-.1px;}
.proj-meta{display:flex;align-items:center;gap:6px;margin-top:8px;flex-wrap:wrap;}
.proj-tag{font-size:10.5px;padding:2px 7px;border-radius:10px;font-weight:600;}
.proj-owner{font-size:11px;color:#aaa;display:flex;align-items:center;gap:3px;}

/* Card BG by column */
.col-todo .proj-card{background:#f8fafc;border:1px solid #e2e8f0;}
.col-doing .proj-card{background:#f0fdf4;border:1px solid #bbf7d0;}
.col-done .proj-card{background:#fafafa;border:1px solid #e8eaed;}
.col-done .proj-title{color:#94a3b8;text-decoration:line-through;}

/* TAG colors */
.tag-tech{background:#dbeafe;color:#1d4ed8;}
.tag-ux{background:#fce7f3;color:#be185d;}
.tag-ops{background:#fef9c3;color:#854d0e;}
.tag-biz{background:#f3e8ff;color:#7c3aed;}
.tag-content{background:#ffedd5;color:#9a3412;}

/* BLOCKER SECTION */
.blockers{background:#fff7ed;border:1.5px solid #fed7aa;border-radius:14px;padding:18px 20px;margin-bottom:36px;}
.blocker-title{font-size:13px;font-weight:700;color:#c2410c;margin-bottom:12px;display:flex;align-items:center;gap:7px;}
.blocker-row{display:flex;align-items:flex-start;gap:10px;font-size:13px;color:#78350f;line-height:1.55;padding:6px 0;border-bottom:1px solid #fed7aa;}
.blocker-row:last-child{border-bottom:none;padding-bottom:0;}
.blocker-row::before{content:'⚠️';flex-shrink:0;margin-top:1px;}
.no-blockers{font-size:13px;color:#86efac;display:flex;align-items:center;gap:6px;}

/* EDIT GUIDE */
.edit-guide{background:#f8faff;border:1.5px solid #dbeafe;border-radius:14px;padding:18px 20px;}
.edit-guide-title{font-size:12.5px;font-weight:700;color:#1d4ed8;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.edit-guide-body{font-size:12px;color:#64748b;line-height:1.7;letter-spacing:-.1px;}
code{background:#e8edf8;color:#1e40af;padding:1px 5px;border-radius:4px;font-size:11.5px;font-family:monospace;}
</style>
</head>
<body>

<nav>
  <a class="back-btn" href="index.html">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8l5 5" stroke="#555" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    홈으로
  </a>
  <span class="nav-title">팀 진행상황</span>
  <span class="nav-badge" id="nav-updated"></span>
</nav>

<main>
  <div class="page-header">
    <h1>📊 팀 진행상황</h1>
    <p>지금 누가 뭘 하고 있는지, 어디서 막혔는지 한눈에</p>
    <div class="updated" id="updated-text"></div>
  </div>

  <!-- TEAM -->
  <div class="section-label">팀원별 현재 작업</div>
  <div class="team-grid" id="team-grid"></div>

  <!-- BOARD -->
  <div class="section-label">프로젝트 보드</div>
  <div class="board">
    <div class="col-todo">
      <div class="col-header">
        <span>⬜</span> 예정
        <span class="col-count" id="cnt-todo"></span>
      </div>
      <div class="col-body" id="col-todo"></div>
    </div>
    <div class="col-doing">
      <div class="col-header">
        <span>🟢</span> 진행 중
        <span class="col-count" id="cnt-doing"></span>
      </div>
      <div class="col-body" id="col-doing"></div>
    </div>
    <div class="col-done">
      <div class="col-header">
        <span>✅</span> 완료
        <span class="col-count" id="cnt-done"></span>
      </div>
      <div class="col-body" id="col-done"></div>
    </div>
  </div>

  <!-- BLOCKERS -->
  <div class="section-label">막힌 곳</div>
  <div class="blockers">
    <div class="blocker-title">⚠️ 블로커 / 대기 중</div>
    <div id="blocker-list"></div>
  </div>

  <!-- EDIT GUIDE -->
  <div class="edit-guide">
    <div class="edit-guide-title">✏️ 업데이트 방법</div>
    <div class="edit-guide-body">
      이 파일 상단의 <code>DATA</code> 객체만 수정하면 됩니다.<br>
      팀원 작업은 <code>TEAM</code> 배열, 프로젝트는 <code>PROJECTS</code> 배열, 블로커는 <code>BLOCKERS</code> 배열에서 수정하세요.<br>
      수정 후 GitHub에 push하면 자동으로 반영됩니다.
    </div>
  </div>
</main>

<script>
/* =====================================================================
   ✏️ 여기만 수정하세요
   ===================================================================== */
const DATA = {

  updated: "2026-06-18",   // 마지막 업데이트 날짜

  /* 팀원
   * status: "active"(진행중) | "idle"(대기) | "blocked"(블로킹)
   * tasks: [] — 현재 하고 있는 일 목록 (최대 3개 권장)
   * dot: "active"(초록) | "waiting"(노랑) | "blocked"(빨강) | "review"(파랑)  */
  TEAM: [
    {
      emoji: "🦷",
      bg: "#fef3c7",
      name: "원장님",
      role: "진료·의사결정",
      status: "active",
      tasks: [
        { text: "리콜 기준 최종 확인", dot: "active" },
        { text: "임플란트 설명서 검토", dot: "review" },
      ]
    },
    {
      emoji: "📋",
      bg: "#dcfce7",
      name: "실장 A",
      role: "리콜·콜관리",
      status: "active",
      tasks: [
        { text: "리콜 프로그램 시범 운영", dot: "active" },
        { text: "콜 목록 DB 정리", dot: "active" },
      ]
    },
    {
      emoji: "📋",
      bg: "#dcfce7",
      name: "실장 B",
      role: "접수·차트",
      status: "idle",
      tasks: [
        { text: "내원별 안내 숙지", dot: "waiting" },
      ]
    },
    {
      emoji: "🗂️",
      bg: "#e0e7ff",
      name: "행정",
      role: "원무·청구",
      status: "idle",
      tasks: []
    },
    {
      emoji: "💻",
      bg: "#fce7f3",
      name: "성아",
      role: "시스템·제품",
      status: "active",
      tasks: [
        { text: "리콜 데스크 UX 시안 제작", dot: "active" },
        { text: "덴트웹 차트 v5 검토", dot: "review" },
        { text: "팀 보드 구축", dot: "active" },
      ]
    },
  ],

  /* 프로젝트
   * status: "todo" | "doing" | "done"
   * tag: "tech" | "ux" | "ops" | "biz" | "content"
   * owner: 담당자 이름  */
  PROJECTS: [
    {
      title: "리콜 프로그램",
      sub: "콜 목록 → 데스크 UI → 실장 배정까지 전체 파이프라인",
      status: "doing",
      tag: "ux",
      owner: "성아 · 실장A"
    },
    {
      title: "덴트웹 차트 대시보드",
      sub: "치아별 진료기록 + 치료계획 + 내원별 안내 3화면",
      status: "doing",
      tag: "tech",
      owner: "성아"
    },
    {
      title: "내원별 치료 안내",
      sub: "27개 치료 카드 + 증상별 라우터 완성",
      status: "done",
      tag: "content",
      owner: "성아"
    },
    {
      title: "진료실 현황판",
      sub: "체어별 타임라인, 가이드투어 포함",
      status: "done",
      tag: "ux",
      owner: "성아"
    },
    {
      title: "홍보 페이지",
      sub: "역할별 후기 카드, 기능 설명 개편",
      status: "done",
      tag: "biz",
      owner: "성아"
    },
    {
      title: "리콜 KPI 콕핏",
      sub: "전환율·콜 성공률 실시간 대시보드",
      status: "todo",
      tag: "tech",
      owner: "미정"
    },
    {
      title: "SMS/카카오 연동",
      sub: "리콜 자동 발송 파이프라인 구축",
      status: "todo",
      tag: "ops",
      owner: "미정"
    },
  ],

  /* 블로커 — 현재 막힌 것들 (없으면 빈 배열 []) */
  BLOCKERS: [
    "리콜 기준(언제 전화할지)을 원장님과 확정 필요 → 실장A 대기 중",
    "SMS 발송 업체 계약 전 — KPI 콕핏 착수 불가",
  ],
};
/* ===================================================================== */


/* 렌더 */
const TAG_CLASS = { tech:"tag-tech", ux:"tag-ux", ops:"tag-ops", biz:"tag-biz", content:"tag-content" };
const TAG_LABEL = { tech:"기술", ux:"UX", ops:"운영", biz:"사업", content:"콘텐츠" };
const STATUS_CHIP = { active:"<span class='status-chip chip-active'>● 진행 중</span>", idle:"<span class='status-chip chip-idle'>○ 대기</span>", blocked:"<span class='status-chip chip-blocked'>✕ 블로킹</span>" };

// 날짜
document.getElementById("updated-text").textContent = "마지막 업데이트: " + DATA.updated;
document.getElementById("nav-updated").textContent = DATA.updated + " 기준";

// 팀원
const teamGrid = document.getElementById("team-grid");
DATA.TEAM.forEach(m => {
  const tasks = m.tasks.length
    ? m.tasks.map(t => `<div class="task-item"><span class="task-dot dot-${t.dot}"></span>${t.text}</div>`).join("")
    : `<div class="member-empty">현재 배정된 작업 없음</div>`;
  teamGrid.innerHTML += `
    <div class="member-card">
      <div class="member-top">
        <div class="avatar" style="background:${m.bg}">${m.emoji}</div>
        <div><div class="member-name">${m.name}</div><div class="member-role">${m.role}</div></div>
      </div>
      <div class="member-tasks">${tasks}</div>
      ${STATUS_CHIP[m.status]}
    </div>`;
});

// 프로젝트
const cols = { todo: document.getElementById("col-todo"), doing: document.getElementById("col-doing"), done: document.getElementById("col-done") };
const cnts = { todo: 0, doing: 0, done: 0 };
DATA.PROJECTS.forEach(p => {
  cnts[p.status]++;
  const tagCls = TAG_CLASS[p.tag] || "tag-tech";
  const tagLbl = TAG_LABEL[p.tag] || p.tag;
  cols[p.status].innerHTML += `
    <div class="proj-card">
      <div class="proj-title">${p.title}</div>
      <div class="proj-sub">${p.sub}</div>
      <div class="proj-meta">
        <span class="proj-tag ${tagCls}">${tagLbl}</span>
        <span class="proj-owner">👤 ${p.owner}</span>
      </div>
    </div>`;
});
Object.entries(cnts).forEach(([k,v]) => document.getElementById("cnt-"+k).textContent = v + "개");

// 블로커
const blockerList = document.getElementById("blocker-list");
if (DATA.BLOCKERS.length === 0) {
  blockerList.innerHTML = `<div class="no-blockers">✅ 현재 블로커 없음</div>`;
} else {
  DATA.BLOCKERS.forEach(b => {
    blockerList.innerHTML += `<div class="blocker-row">${b}</div>`;
  });
}
</script>
</body>
</html>
