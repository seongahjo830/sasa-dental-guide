<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>차트 대시보드 — 서울사계절치과</title><style>
:root{
  --bg:#FBFAF7;--card:#FFFFFF;--ink:#211E19;--muted:#6B6760;--line:#E7E3DC;--accent:#1D4ED8;
  font-family:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic","맑은 고딕",sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);min-height:100vh;}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 28px;}
.top{text-align:center;margin-bottom:34px;}
.top .logo{font-size:12.5px;letter-spacing:.18em;color:var(--accent);font-weight:800;}
.top h1{font-size:27px;margin:10px 0 4px;letter-spacing:-0.035em;}
.top .pt{font-size:14.5px;color:var(--muted);}
.top .pt b{color:#211E19;}
.cards{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:20px;width:100%;max-width:1000px;}
.c{display:flex;flex-direction:column;align-items:center;text-align:center;background:var(--card);border:1px solid var(--line);border-radius:20px;padding:38px 26px 32px;text-decoration:none;color:var(--ink);box-shadow:0 1px 3px rgba(30,25,15,.05);transition:border-color .15s,transform .12s,box-shadow .15s;}
.c:hover{border-color:var(--accent);transform:translateY(-5px);box-shadow:0 12px 28px rgba(29,78,216,.13);}
.c .ic{width:80px;height:80px;border-radius:22px;display:flex;align-items:center;justify-content:center;font-size:40px;background:#EEF3FE;margin-bottom:22px;}
.c h2{margin:0;font-size:24px;letter-spacing:-0.03em;font-weight:800;}
.demo{margin-top:34px;font-size:12px;color:#a39d92;}
.promo{position:fixed;right:20px;bottom:20px;z-index:50;display:inline-flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:10px 17px 10px 14px;text-decoration:none;color:#5a554c;font-size:13.5px;font-weight:700;box-shadow:0 4px 14px rgba(30,25,15,.1);transition:border-color .15s,transform .12s;}
.promo:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-2px);}
.promo .pic{font-size:16px;}
@media(max-width:760px){.cards{grid-template-columns:1fr;max-width:420px;}.c{padding:28px 24px;flex-direction:row;text-align:left;gap:20px;}.c .ic{margin-bottom:0;flex:0 0 auto;width:60px;height:60px;font-size:29px;}}
</style></head><body>
<div class="top">
  <div class="logo">서울사계절치과 · 덴트웹 차트</div>
  <h1>환자 차트 대시보드</h1>
  <div class="pt">환자 <b>김성호</b> · 8821 · 52세</div>
</div>
<div class="cards">
  <a class="c" href="차트확인.html">
    <span class="ic">🦷</span>
    <h2>치아별 진료기록</h2>
  </a>
  <a class="c" href="치료계획.html">
    <span class="ic">📋</span>
    <h2>치료계획 설명</h2>
  </a>
  <a class="c" href="내원별/index.html">
    <span class="ic">📖</span>
    <h2>내원별 치료안내</h2>
  </a>
</div>
<div class="demo">🧪 UI 목업 · 데모 환자 가상</div>


<link rel="stylesheet" href="tour.css">
<script src="tour.js"></script>
<script>
startDentTour({
  id:'hub',
  welcome:{
    emoji:'🗂️', title:'환자 한 명을, 세 화면으로',
    lead:'덴트웹 차트 위에 얹은 데모입니다. 환자를 <b>파악 → 설명 → 안내</b>하는 흐름을 세 카드로 나눴어요.',
    bullets:[
      '<b>치아별 진료기록</b> — 직원이 파악',
      '<b>치료계획 설명</b> — 환자에게 브리핑',
      '<b>내원별 안내</b> — 그날 받을 치료'
    ],
    cta:'어떤 화면인지 보기', skip:'바로 들어갈게요'
  },
  steps:[
    { el:function(){return document.querySelectorAll('.cards .c')[0];}, place:'bottom', kick:'화면 1 · 파악',
      title:'치아별 진료기록',
      body:'치식도를 눌러 그 이의 히스토리·환자 성향·잇몸까지 한 화면에서 봅니다. <b>응대 전에 파악</b>하는 화면이에요.' },
    { el:function(){return document.querySelectorAll('.cards .c')[1];}, place:'bottom', kick:'화면 2 · 설명',
      title:'치료계획 설명',
      body:'진단 → 치료 → 순서 → 비용을 <b>환자 앞에서 넘기며</b> 브리핑하는 화면입니다.' },
    { el:function(){return document.querySelectorAll('.cards .c')[2];}, place:'bottom', kick:'화면 3 · 안내',
      title:'내원별 치료안내',
      body:'그날 받을 치료 안내가 회차마다 자동으로. 환자가 <b>대기시간에 폰으로</b> 미리 보는 화면이에요.' }
  ],
  finish:{ emoji:'👆', title:'이제 골라서 열어보세요',
    lead:'카드를 누르면 각 화면이 열리고, <b>그 안에서도 안내</b>가 한 번 더 떠요.',
    cta:'시작하기' }
});
</script>
</body></html>
